<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Citas - Registrar Cita</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="fondo-sistema">

    <div class="contenedor-principal">
        
        <header class="tarjeta cabecera-sistema">
            <div class="titulo-sistema">
                <h1>Sistema de Gestión Médica</h1>
            </div>
            <div class="info-usuario">
                <span class="texto-usuario">Usuario: <strong>admin</strong></span>
                <a href="index.html" id="btn-cerrar-sesion" class="btn-logout">Cerrar Sesión</a>
            </div>
        </header>

        <main class="tarjeta">
            <div class="encabezado-formulario">
                <h2>Registrar Nueva Cita</h2>
                <a href="menu_principal.html" class="btn-volver">← Volver al Menú Principal</a>
            </div>
            
            <div id="contenedor-mensajes"></div>

            <form id="form-registrar-cita">
                
                <fieldset class="seccion-formulario">
                    <legend>Datos del Paciente</legend>
                    <label for="buscar-paciente">DNI o Nombre Completo: *</label>
                    <div class="grupo-busqueda">
                        <input type="text" id="buscar-paciente" name="paciente" placeholder="Ej: 71234567" required>
                        <button type="button" id="btn-buscar-paciente" class="btn-accion">Buscar</button>
                    </div>
                    <span id="estado-paciente"></span>
                    
                    <div id="info-paciente-detallada" class="caja-info-paciente" style="display: none;">
                    </div>
                </fieldset>

                <fieldset class="seccion-formulario">
                    <legend>Detalles de la Cita</legend>
                    <div class="fila-formulario">
                        <div class="columna-formulario">
                            <label for="especialidad">Especialidad Médica: *</label>
                            <select id="especialidad" name="especialidad" required>
                                <option value="" disabled selected>Seleccione una especialidad</option>
                                <option value="cardiologia">Cardiología</option>
                                <option value="pediatria">Pediatría</option>
                                <option value="medicina_general">Medicina General</option>
                            </select>
                        </div>
                        <div class="columna-formulario">
                            <label for="medico">Médico Especialista: *</label>
                            <select id="medico" name="medico" required disabled>
                                <option value="" disabled selected>Seleccione primero especialidad</option>
                            </select>
                        </div>
                    </div>

                    <div class="fila-formulario">
                        <div class="columna-formulario">
                            <label for="fecha">Fecha de la Cita: *</label>
                            <input type="date" id="fecha" name="fecha" required>
                        </div>
                        <div class="columna-formulario">
                            <label for="hora">Hora de la Cita: *</label>
                            <select id="hora" name="hora" required disabled>
                                <option value="" disabled selected>Seleccione médico y fecha</option>
                            </select>
                        </div>
                    </div>
                </fieldset>

                <fieldset class="seccion-formulario">
                    <legend>Información de Atención</legend>
                    <label for="motivo">Motivo de Atención: *</label>
                    <textarea id="motivo" name="motivo" rows="2" placeholder="Describa el motivo" required></textarea>

                    <label for="observaciones">Observaciones (Opcional):</label>
                    <textarea id="observaciones" name="observaciones" rows="2"></textarea>
                </fieldset>

                <div class="acciones-formulario">
                    <button type="submit" id="btn-registrar" class="btn-guardar">Confirmar y Registrar Cita</button>
                    <button type="reset" id="btn-cancelar" class="btn-limpiar">Limpiar Formulario</button>
                </div>

            </form>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
